<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Threads 20ツリー投稿ジェネレーター（MVP）</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Threads 20ツリー投稿ジェネレーター（MVP）</h1>
        <p class="lead">テーマを1行ずつ入れるだけで、るナース文体のツリー投稿を20セット作成します。</p>
      </header>

      <section class="panel form-panel">

        <div class="field">
          <label for="themeInput">今日のテーマ一覧</label>
          <textarea
            id="themeInput"
            rows="8"
            placeholder="空欄でもOK（テーマ候補100個から20個を自動選択）\n例：毎日書いてるのに反応がなくて不安になる日\n値段を下げても売れなかった昔のわたし"
          ></textarea>
        </div>

        <div class="actions">
          <button id="fillRecommendedBtn" class="secondary">今日の20テーマを自動で入れる</button>
          <button id="clearThemesBtn" class="secondary">テーマ一覧をクリア</button>
          <button id="generateBtn" class="primary">20セットを生成する</button>
          <button id="copyAllBtn" class="secondary" disabled>20セットをまとめてコピー</button>
        </div>
        <p class="hint">空欄のまま生成してもOK。毎日使っても被りにくいように、テーマ候補から20個を自動で選びます。</p>

        <p id="status" class="status" aria-live="polite"></p>
      </section>

      <section class="panel">
        <h2>生成結果</h2>
        <p class="hint">各セットの投稿1/投稿2を個別コピー、またはツリーをまとめてコピーできます。</p>
        <div id="results" class="results"></div>
      </section>
    </main>

    <template id="postTemplate">
      <article class="post-card">
        <div class="post-header">
          <span class="post-number"></span>
        </div>
        <p class="post-time"></p>
        <p class="post-theme"></p>
        <p class="post-type"></p>

        <label class="tree-label">投稿1（1/2）</label>
        <textarea class="post-text post1-text" rows="9" readonly></textarea>
        <button class="copy-post1-btn secondary" data-default-label="投稿1をコピー">投稿1をコピー</button>

        <label class="tree-label">投稿2（2/2）</label>
        <textarea class="post-text post2-text" rows="9" readonly></textarea>
        <button class="copy-post2-btn secondary" data-default-label="投稿2をコピー">投稿2をコピー</button>

        <button class="copy-tree-btn secondary" data-default-label="ツリーをまとめてコピー">ツリーをまとめてコピー</button>
        <p class="copy-feedback" aria-live="polite"></p>
      </article>
    </template>

    <script src="app.js" type="module"></script>
  </body>
</html>
