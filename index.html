<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Threads 20ツリー投稿ジェネレーター（MVP）</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Threads 20ツリー投稿ジェネレーター（MVP）</h1>
        <p class="lead">テーマ・狙い・口調を選ぶだけで、2投稿1セットのツリー投稿案を20セット作成します。</p>
      </header>

      <section class="panel form-panel">
        <div class="field">
          <label for="themeInput">今日のテーマ</label>
          <input
            id="themeInput"
            type="text"
            placeholder="例：看護師が副業を始める最初の一歩"
            maxlength="120"
          />
        </div>

        <div class="field">
          <label for="goalSelect">今日の狙い</label>
          <select id="goalSelect"></select>
        </div>

        <div class="field">
          <label for="toneSelect">口調</label>
          <select id="toneSelect"></select>
        </div>

        <div class="actions">
          <button id="generateBtn" class="primary">20セットを生成する</button>
          <button id="copyAllBtn" class="secondary" disabled>20セットをまとめてコピー</button>
        </div>

        <p id="status" class="status" aria-live="polite"></p>
      </section>

      <section class="panel">
        <h2>生成結果</h2>
        <p class="hint">各セットの投稿1/投稿2を個別コピー、またはツリーをまとめてコピーできます。</p>
        <div id="results" class="results"></div>
      </section>
    </main>

    <template id="postTemplate">
      <article class="post-card">
        <div class="post-header">
          <span class="post-number"></span>
        </div>
        <label class="tree-label">投稿1（1/2）</label>
        <textarea class="post-text post1-text" rows="7" readonly></textarea>
        <button class="copy-post1-btn secondary">投稿1をコピー</button>

        <label class="tree-label">投稿2（2/2）</label>
        <textarea class="post-text post2-text" rows="7" readonly></textarea>
        <button class="copy-post2-btn secondary">投稿2をコピー</button>

        <button class="copy-tree-btn secondary">ツリーをまとめてコピー</button>
      </article>
    </template>

    <script src="app.js" type="module"></script>
  </body>
</html>
